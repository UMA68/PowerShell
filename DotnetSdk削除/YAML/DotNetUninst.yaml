# ==========================
# プロジェクト情報
# ==========================
Project:                    # プロジェクト情報
 Name: "Uninstall .NET SDK" # プロジェクト名
 ScriptVersion: "1.1.0"     # スクリプトバージョン

# -----------------
# 実行環境
# -----------------
PowerShell:     # PowerShell情報
 Version: 7.5.4 # PowerShellのバージョン

# 実行に必要なモジュール
Module:
 Powershell-Yaml:       # モジュール情報   
  Name: powershell-yaml # モジュール名
  Version: 0.4.7        # モジュールバージョン

# -----------------
# ログ設定
# -----------------
# ログのクリーンアップ設定
LogCleanup:         # ログのクリーンアップ設定
 Enabled: true      # ログクリーンアップを有効にするかどうか
 RetentionDays: 30  # 保持するログファイルの日数

# ログ設定
LOG:                            # ログ設定  
 FILENAME: DotNetSdk_Uninstall  # ログファイル名
 EXTENSION: .log                # ログファイル拡張子

# -----------------
# タイムアウト設定
# -----------------
Timeout:                # タイムアウト設定
 UninstallSeconds: 300  # SDK削除のタイムアウト時間（秒）

# -----------------
# Popupダイアログアイコン
# -----------------
PopupIcon:          # Popupダイアログアイコン設定
 Error: 0x10        # 停止アイコン（エラー）
 Warning: 0x30      # 警告アイコン
 Information: 0x40  # 情報アイコン

# -----------------
# バージョン検証
# -----------------
Validation:           # バージョン検証設定
 VersionPattern: '^\d+\.\d+\.\d+(\.\d+)?$'  # バージョン形式の正規表現（x.y.z または x.y.z.w）

# -----------------
# 終了コード
# -----------------
ExitCode:                   # 終了コード設定
 Success: 0                 # 正常終了
 GeneralError: 1            # 一般エラー
 UserCancelled: 2           # ユーザーキャンセル
 InsufficientPrivileges: 3  # 管理者権限不足
 VersionError: 4            # バージョン検証エラー
 UninstallFailed: 5         # アンインストール失敗
