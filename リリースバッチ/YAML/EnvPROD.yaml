# -----------------
# 実行環境
# -----------------
PowerShell: 
 Version: 7.3.9
# 実行に必要なモジュール
Module:
 Powershell-Yaml:
  Name: powershell-yaml
  Version: 0.4.7
 SqlServer:
  Name: SqlServer
  Version: 22.1.1
#  Version: 21.1.18235

# -----------------
# 接続情報
# -----------------
# VERSIONには"SELECT @@VERSION;"の結果をコピペ

HOST:
 APServer:
  - \\localhost\C$      # サーバー名orIPアドレス
#  BKServer:
#   - \\192.168.1.11\f$   # サーバー名orIPアドレス
 USERNAME: Administrator       # ユーザー名
 PWF: test.pass     # パスワードファイル名

# -----------------
# ログ保存先
# -----------------
LOG:
 Path: \\localhost\C$\SandBox\TEST_FOLDER\リリース元\LOG   # ログ保存先(フォルダ名)
 FILENAME: release(PRODUCT)          # ログファイル名
 EXTENSION: .log            # ログファイル拡張子

# ===================
# リリースフォルダ管理
# -------------------
# SAMPLE:   # リリース種別
#  FolderBy # リリース元
#   - 一つだけ: リリース元フォルダ
#  ReleaseTo # リリース先
#   - 複数可: リリース先フォルダ
#   = 複数可: リリース先フォルダ
# ===================
RELEASE:
 TYPE_A:
  FolderBy:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース元\TYPE_A
  ReleaseTo:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース先\TYPE_A\PROD
 TYPE_B:
  FolderBy:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース元\TYPE_B
  ReleaseTo:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース先\TYPE_B\PROD
 TYPE_C:
  FolderBy:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース元\TYPE_C
  ReleaseTo:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース先\TYPE_C\PROD
 