# =================
Project: release(PRODUCTION)
Version: 0.0.0
# =================

# -----------------
# 実行環境
# -----------------
PowerShell: 
 Version: 7.3.9
# 実行に必要なモジュール
Module:
 Powershell-Yaml:
  Name: powershell-yaml
  Version: 0.4.7
 SqlServer:
  Name: SqlServer
  Version: 22.1.1
#  Version: 21.1.18235

# -----------------
# 接続情報
# -----------------
# VERSIONには"SELECT @@VERSION;"の結果をコピペ

HOST:
 APServer:
  - \\localhost\C$      # サーバー名orIPアドレス
#  BKServer:
#   - \\192.168.1.11\f$   # サーバー名orIPアドレス
 USERNAME: Administrator       # ユーザー名
 PWF: test.pass     # パスワードファイル名

# -----------------
# ログ保存先
# -----------------
LOG:
 Path: \\\\localhost\C$\SandBox\TEST_FOLDER\リリース元\LOG   # ログ保存先(フォルダ名)
 FILENAME: release(PROD)    # ログファイル名
 EXTENSION: .log            # ログファイル拡張子
 USERS:                      # 追加閲覧ユーザー（配列、省略可）
                             # 例: "DOMAIN\\AuditUser", "DOMAIN\\ReviewUser"

# -----------------
# セキュリティ設定
# -----------------
SECURITY:
 # ログファイルに出力される機密情報の検出キーワード（マスキング対象）
 SensitivePatterns:
  - "password"
  - "passwd"
  - "pwd"
  - "secret"
  - "token"
  - "api_key"
  - "api-key"
  - "apikey"
  - "auth"
  - "credential"
  - "username"
  - "user"

# -----------------
# メッセージ定義（多言語対応）
# -----------------
MESSAGES:
  LANGUAGE: en  # ja: 日本語, en: English
  ja:
    SCRIPT_READ_ERROR: "PowerShell ファイルを読み込めませんでした。処理を終了します。"
    MODULE_NOT_INSTALLED: "モジュール 'PowerShell-Yaml' がインストールされていません。処理を終了します。"
    MODULE_CHECK_ERROR: "'Test-ModuleInstalled' を実行できませんでした。処理を終了します。"
    YAML_READ_ERROR: "YAMLファイルを読み込めませんでした。処理を終了します。"
    VERSION_WARNING: "実行中のPowerShellは{0}です。\r\n\r\nこのスクリプトはバージョン{1}でのみ動作確認しています。処理を続行しますか？"
    EXECUTE_CONFIRM: "リリースを実行しますか？"
    UNKNOWN_BUTTON: "不明なボタンが押されました。"
    MODULE_IMPORT_SUCCESS: "モジュール '{0}({1})' のインポートが成功しました。"
    MODULE_IMPORT_ERROR: "モジュール '{0}({1})' のインポートが失敗しました。処理を終了します。"
    MODULE_INSTALL_PROMPT: "モジュール '{0}' がインストールされていません。インストールを実施してください。"
    MODULE_EMPTY_SKIP: "モジュール名またはバージョンが空です。モジュールのインポートをスキップします。"
  en:
    SCRIPT_READ_ERROR: "I couldn't read the PowerShell file. I'm ending the process."
    MODULE_NOT_INSTALLED: "Module 'PowerShell-Yaml' is not installed. I'm ending the process."
    MODULE_CHECK_ERROR: "I couldn't execute 'Test-ModuleInstalled'. I'm ending the process."
    YAML_READ_ERROR: "I couldn't read the YAML file. I'm ending the process."
    VERSION_WARNING: "The running PowerShell version is {0}.\r\n\r\nThis script has only been tested with version {1}. Do you want to continue?"
    EXECUTE_CONFIRM: "Do you want to execute the release?"
    UNKNOWN_BUTTON: "An unknown button was pressed."
    MODULE_IMPORT_SUCCESS: "The import of module '{0}({1})' was successful."
    MODULE_IMPORT_ERROR: "Module '{0}({1})' import failed. I'm ending the process."
    MODULE_INSTALL_PROMPT: "Module '{0}' is not installed. Do you want to install it?"
    MODULE_EMPTY_SKIP: "Module name or version is empty. Skipping module import."

# ===================
# リリースフォルダ管理
# -------------------
# SAMPLE:   # リリース種別
#  FolderBy # リリース元
#   - 一つだけ: リリース元フォルダ
#  ReleaseTo # リリース先
#   - 複数可: リリース先フォルダ
#   = 複数可: リリース先フォルダ
# ===================
RELEASE:
 TYPE_A:
  FolderBy:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース元\TYPE_A
  ReleaseTo:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース先\TYPE_A\PROD
 TYPE_B:
  FolderBy:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース元\TYPE_B
  ReleaseTo:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース先\TYPE_B\PROD
 TYPE_C:
  FolderBy:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース元\TYPE_C
  ReleaseTo:
   - \\localhost\C$\SandBox\TEST_FOLDER\リリース先\TYPE_C\PROD
 