# ===========================================
# リリース環境設定ファイル - 本番環境（PROD）
# ===========================================
# File Name      : EnvPROD.yaml
# Author         : UMA68
# Version        : 1.2.0
# Release Date   : 2025-12-10
# Last Modified  : 2025-12-10
# Description    : 本番環境用のリリース設定定義
# 
# 変更履歴:
# v1.2.0 (2025-12-10)
#   - セキュリティ設定を追加（SensitivePatterns）
#   - MESSAGES セクション拡張
# v1.1.0 (2025-12-09)
#   - メッセージの多言語化対応
# v1.0.0 (2025-11-20)
#   - 初版リリース
