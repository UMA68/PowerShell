# ====================================================================
# PowerShellモジュール一括インストール設定ファイル(テスト用)
# ====================================================================
# このファイルは、InstMain.ps1 スクリプトで使用されるモジュール情報を定義します。
# 
# 使用方法:
#   .\InstMain.ps1                          # 標準ファイル（Env.yaml）を使用
#   .\InstMain.ps1 -envFileName "Test.yaml" # テスト用設定ファイルを使用
#
# 環境別設定:
#   - Env.yaml        : 開発環境用
#   - Staging.yaml    : ステージング環境用
#   - Production.yaml : 本番環境用
#   - Test.yaml       : テスト用（このファイル）
# ====================================================================

# プロジェクト情報
Project: InstallModule
Version: 1.0.0

# --------------------------------------------------------------------
# 実行環境
# --------------------------------------------------------------------
# 想定する PowerShell バージョンを指定します。
# 実行時のバージョンと異なる場合、警告が表示されます。
PowerShell:
 Version: 7.3.9                # 検証済みバージョン（推奨: 7.3.9以上）

# --------------------------------------------------------------------
# モジュール定義
# --------------------------------------------------------------------
# インストールするPowerShellモジュールを定義します。
# 各モジュールは以下の形式で記述：
#
#  モジュールキー:
#   Name: モジュール名          # PowerShell Gallery上の正式名称
#   Version: x.x.x            # インストールするバージョン番号
#
# 注意事項:
#  - Name は PowerShell Gallery の正式名称と完全一致させてください
#  - Version は明示的に指定することを推奨（省略可能ですが非推奨）
#  - コメントアウト（#）で一時的に無効化できます
# --------------------------------------------------------------------

Module:
 # ------------------------------------------------------------
 # 必須モジュール（自動インストール）
 # ------------------------------------------------------------
 powershell-yaml:
  Name: powershell-yaml        # YAML設定ファイル読み込み用（必須）
  Version: 0.4.7
 
 # ------------------------------------------------------------
 # データベース関連モジュール
 # ------------------------------------------------------------
 SqlServer:
  Name: SqlServer              # SQL Server管理・クエリ実行用
  Version: 22.1.1              # SQL Server 2022対応版
 
 # ------------------------------------------------------------
 # データ処理モジュール
 # ------------------------------------------------------------
 ImportExcel:
  Name: ImportExcel            # Excelファイル読み書き用（Excel不要）
  Version: 7.8.5

# ------------------------------------------------------------
# モジュール追加例（テンプレート）
# ------------------------------------------------------------
# 新しいモジュールを追加する場合は、以下のテンプレートを参考にしてください：
#
# Az:
#  Name: Az                    # Azure PowerShell モジュール
#  Version: 11.0.0
#
# Pester:
#  Name: Pester                # PowerShell テストフレームワーク
#  Version: 5.5.0
#
# PSScriptAnalyzer:
#  Name: PSScriptAnalyzer      # PowerShell コード解析ツール
#  Version: 1.21.0
# ------------------------------------------------------------
