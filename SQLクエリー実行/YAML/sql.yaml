        May 26 2023 12:52:08
        Copyright (C) 2022 Microsoft Corporation
        Developer Edition (64-bit) on Linux (Ubuntu 20.04.6 LTS) <X64>

# -----------------
# ログ保存先
# -----------------
LOG:
 FOLDER: LOG      # ログ保存先(フォルダ名)
 FILENAME: log    # ログファイル名
 EXTENSION: .log  # ログファイル拡張子

# =================
# リリースフォルダ
# -----------------
# SAMPLE:   # リリース種別
#  FolderBy # リリース元
#   - 一つだけ: リリース元フォルダ
# =================
RELEASE:
 SQL:
  FolderBy:
   - SQL
 STP:
  FolderBy:
   - STP
