name: PSScriptAnalyzer

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.ps1'
      - '**.psm1'
      - '**.psd1'
      - 'PSScriptAnalyzerSettings.psd1'
      - '.github/workflows/psscriptanalyzer.yml'

# 無駄な同時実行を止めて分課金を抑制
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: PSScriptAnalyzer コード品質チェック
    runs-on: windows-latest
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: PSScriptAnalyzer をインストール
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          
      - name: PSScriptAnalyzer バージョンを表示
        shell: pwsh
        run: |
          Get-Module -ListAvailable PSScriptAnalyzer | Select-Object Name, Version

      - name: Invoke-ScriptAnalyzerChanged のパラメータ型を表示
        shell: pwsh
        run: |
          $cmd = Get-Command .\scripts\Invoke-ScriptAnalyzerChanged.ps1
          $cmd.Parameters.GetEnumerator() |
            Sort-Object Key |
            ForEach-Object { "{0} : {1}" -f $_.Key, $_.Value.ParameterType.FullName }
          
      - name: 変更差分のみ PSScriptAnalyzer を実行
        shell: pwsh
        run: |
          $baseRef = 'origin/main'
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $baseRef = 'origin/${{ github.base_ref }}'
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          }
          elseif ('${{ github.event_name }}' -eq 'push') {
            $baseRef = '${{ github.event.before }}'
            if ([string]::IsNullOrWhiteSpace($baseRef) -or $baseRef -match '^0+$') {
              $baseRef = 'HEAD~1'
            }

            $null = git rev-parse --verify $baseRef 2>$null
            if ($LASTEXITCODE -ne 0) {
              $baseRef = 'HEAD~1'
            }
          }

          & .\scripts\Invoke-ScriptAnalyzerChanged.ps1 `
            -BaseRef $baseRef `
            -HeadRef 'HEAD' `
            -FailOnSeverity @('Error') `
            -OutputJsonPath 'LOG/psscriptanalyzer-changed.json'
          
      - name: 結果をアップロード（エラー時のみ）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: psscriptanalyzer-results
          path: ${{ github.workspace }}
          retention-days: 30
