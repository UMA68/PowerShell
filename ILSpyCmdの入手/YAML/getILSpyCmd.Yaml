# -----------------
# 実行環境
# -----------------
PowerShell: 
 Version: 7.5.2
# 実行に必要なモジュール
Module:
 Powershell-Yaml:
  Name: powershell-yaml
  Version: 0.4.7
#  SqlServer:
#   Name: SqlServer
#   Version: 22.1.1
# #  Version: 21.1.18235

# .NET SDKの導入設定
DotnetSdk:
 SdkFolder: DotnetSDK
 Installer: dotnet-sdk-8.0.411-win-x64.exe
 Version: 8.0.411

# ILSpyCmdの設定
ILSpyCmd:
 ExpectedVersion: 9.1.0.7988  # 期待するILSpyCmdのバージョン（インストール確認時に使用）

# -----------------
# ログ設定
# -----------------
LOG:
#  Path: \\localhost\C$\SandBox\TEST_FOLDER\リリース元\LOG   # ログ保存先(フォルダ名)
 FILENAME: ILSpyCmd # ログファイル名
 EXTENSION: .log    # ログファイル拡張子
